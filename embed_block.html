<!-- ───────────── Webflow embed snippet — Tableau v3 Embedding API ───────────
     Uses parent-page authentication (NO iframe-auth) to support
     On-Demand Access (ephemeral users created by the JWT).
     --------------------------------------------------------------------- -->

<style>
  html, body           { margin:0; padding:0; height:100%; }
  #tableau-container   { width:100%; height:100vh; }
  tableau-viz          { width:100%; height:100%; display:block; }
</style>

<div id="tableau-container">Loading Tableau dashboard…</div>

<!-- 1 · Load the ES-module build of the Embedding API -->
<script
  type="module"
  src="https://us-east-1.online.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js">
</script>

<!-- 2 · Application logic -->
<script type="module">
(async function loadDashboard () {
  const container = document.getElementById('tableau-container');

  try {
    /* 1 · Fetch logged-in Memberstack profile ---------------------------- */
    const memberRes = await window.$memberstackDom.getCurrentMember();
    if (!memberRes?.data) {
      container.textContent = 'User is not logged in.';
      return;
    }
    const m = memberRes.data;

    /* 2 · Retrieve raw Memberstack token -------------------------------- */
    let msToken;
    if (typeof window.$memberstackDom.getMemberToken === 'function') {
      msToken = await window.$memberstackDom.getMemberToken();
    } else if (typeof window.$memberstackDom.getMemberCookie === 'function') {
      const cookie = window.$memberstackDom.getMemberCookie();
      msToken = cookie?.split(';')[0]?.split('=')[1] || cookie;
    } else {
      throw new Error('Memberstack token API not available');
    }
    if (!msToken) throw new Error('Memberstack token missing');

    /* 3 · Exchange Memberstack token for Tableau JWT -------------------- */
    const body = {
      sub:           m.auth.email,
      agency_id:     m.customFields.agency_id    ?? m.customFields['agency-id'] ?? null,
      role:          m.customFields.role         ?? 'viewer',
      allowed_kpis:  m.customFields.allowed_kpis ?? [],
      tabGroup:      m.customFields['tab-group'] ?? 'ExternalViewers',
      landing_page:  m.customFields['landing-page'] ?? 'DOverview'
    };

    const resp = await fetch('https://jwt-generator-847696198884.us-east1.run.app/', {
      method:  'POST',
      mode:    'cors',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${msToken}`
      },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error(`Token fetch failed (${resp.status})`);
    const { access_token } = await resp.json();

    /* 4 · Embed Tableau viz --------------------------------------------- */
    const dashboard   = m.customFields.dashboard      ?? 'DefaultDashboard';
    const landingPage = m.customFields['landing-page'] ?? 'DOverview';
    const vizUrl =
      `https://us-east-1.online.tableau.com/t/cteanalytics-embed/views/` +
      `${dashboard}/${landingPage}?embed=y`;

    const vizElem = document.createElement('tableau-viz');
    vizElem.src           = vizUrl;
    vizElem.setAttribute('hide-tabs', '');
    vizElem.setAttribute('toolbar',   'bottom');
    vizElem.setAttribute('token',    access_token);
    // NOTE: no iframe-auth attribute → parent-page auth flow
    container.textContent = '';
    container.appendChild(vizElem);
  } catch (err) {
    console.error('[DEBUG] loadDashboard catch →', err);
    container.textContent =
      'Error loading Tableau dashboard. Please try again later.';
  }
})();
</script>
